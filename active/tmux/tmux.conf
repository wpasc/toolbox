# tmux configuration
# Philosophy: defaults where sensible, override only for clear ergonomic wins

# =============================================================================
# PLUGINS (TPM)
# =============================================================================
# Install plugins: prefix + I
# Update plugins:  prefix + U
# Remove plugins:  prefix + alt + u

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'

# =============================================================================
# THEME — Monokai Remastered
# =============================================================================
# Colors pulled from Ghostty's Monokai Remastered theme for a unified look.
# Replaces catppuccin plugin — fewer moving parts, same visual result.

# Status bar: dark background, muted foreground
set -g status-style 'bg=#1a1a1a,fg=#c4c5b5'

# Window tabs: context-aware naming.
# - nvim: show #{pane_title} (neovim sets this to the filename via vim.opt.title)
# - Claude Code: sets pane_title to "Claude Code" — detect via title match
# - Everything else: show directory basename
# Nested ternary: check nvim first, then Claude Code, then fall back to dir.
# Inactive: dim text on dark surface
set -g window-status-format ' #I  #{?#{==:#{pane_current_command},nvim},#{pane_title},#{?#{m:*Claude Code*,#{pane_title}},Claude,#{b:pane_current_path}}} '
set -g window-status-style 'fg=#625e4c,bg=#1a1a1a'
# Active: bright text on slightly lighter surface
set -g window-status-current-format ' #I  #{?#{==:#{pane_current_command},nvim},#{pane_title},#{?#{m:*Claude Code*,#{pane_title}},Claude,#{b:pane_current_path}}} '
set -g window-status-current-style 'fg=#f6f6ef,bg=#343434'

# Pane borders: subtle inactive, orange active
set -g pane-border-style 'fg=#343434'
set -g pane-active-border-style 'fg=#fd971f'

# Message/command bar
set -g message-style 'bg=#343434,fg=#d9d9d9'

# Left status: session name (before window tabs).
# Prefix indicator: session name inverts to dark-on-orange when prefix is active,
# giving immediate visual feedback that tmux received the keypress.
set -g status-left '#{?client_prefix,#[fg=#1a1a1a]#[bg=#fd971f] #S #[default]#[bg=#1a1a1a]#[fg=#625e4c]│ , #[fg=#fd971f]#S #[fg=#625e4c]│ }'
# Right status: date/time
set -g status-right ' #[fg=#c4c5b5]%m/%d %H:%M '

# =============================================================================
# PREFIX
# =============================================================================
# Ctrl-Space instead of default Ctrl-B.
# Why: Ctrl-B conflicts with readline backward-char and NeoVim's page-up.
# Ctrl-Space has no standard binding in shells, vim, or most terminal apps.
# Ctrl-A (screen-style) was considered but conflicts with readline go-to-start.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# =============================================================================
# SPLITS - OVERRIDING DEFAULTS
# =============================================================================
# | for vertical, - for horizontal (replaces default % and ").
# Why: the default keys have no visual mnemonic and " requires shift.
# | and - visually represent the split direction — obvious and easy to remember.
# v/s (vim-style) were considered but conflict with other tmux defaults.
# -c keeps the new pane in the same working directory (tmux default is $HOME).

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =============================================================================
# PANE NAVIGATION
# =============================================================================
# hjkl pane navigation (in addition to default arrow keys which still work).
# Why: keeps hands on home row, consistent with NeoVim muscle memory.
# These require prefix first, so they don't conflict with NeoVim's own hjkl.
# vim-tmux-navigator (Ctrl+hjkl without prefix) was considered but rejected —
# Ctrl+hjkl conflicts with too many other tools (terminal, NeoVim plugins).

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# WINDOW MANAGEMENT
# =============================================================================
# Remapped to match browser/editor muscle memory (Cmd+N, Cmd+W).
# Why: tmux defaults are arbitrary (c=create, &=kill) with no mnemonic value.
# Browser/editor habits (n=new, w=close) are deeply ingrained and worth matching.
# Default w (window picker) is redundant with tmux-fzf (prefix + F).
# Default n (next window) is redundant with prefix + 1/2/3 direct jumps.

unbind c    # default: new window
unbind &    # default: kill window
unbind n    # default: next window
unbind w    # default: window picker (covered by tmux-fzf)
bind n new-window -c "#{pane_current_path}"
# No confirmation — matches browser/Cursor Cmd+W behavior (instant close).
bind w kill-window

# Window navigation: prefix + H/L switches to previous/next window.
# Why: uppercase mirrors the lowercase hjkl pane nav — same keys, shifted = windows.
# Ghostty maps Cmd+Opt+Left/Right to these (see Ghostty config).
bind H previous-window
bind L next-window

# Reorder windows: prefix + B/N swaps the current window one position.
# B = back (left), N = next (right). Uppercase to avoid conflict with n (new window).
# Ghostty maps Cmd+Ctrl+B/N to these (see Ghostty config).
# select-window follows the moved window so it stays focused.
bind B swap-window -t -1 \; select-window -t -1
bind N swap-window -t +1 \; select-window -t +1

# =============================================================================
# QUALITY OF LIFE
# =============================================================================

# Reload config: prefix + r.
# Why: essential feedback loop when tweaking config — change, reload, verify.
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Start window numbering at 1 (0 is far from other numbers on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (avoid gaps)
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Enable mouse support (useful for beginners, can disable later if preferred)
set -g mouse on

# Allow OSC 52 clipboard passthrough (required for neovim clipboard over SSH)
set -g set-clipboard on

# Reduce escape delay (important for vim users)
set -sg escape-time 10

# =============================================================================
# APPEARANCE
# =============================================================================

# Status bar at top (feels like browser/editor tabs)
set -g status-position top

# Better terminal type for OSC 52 and true color support
set -g default-terminal "tmux-256color"

# =============================================================================
# TERMINAL TITLE
# =============================================================================
# Push the active window name into the terminal's title bar.
# Replaces Ghostty's default window ID (e.g. [7]) with something useful.
set -g set-titles on
set -g set-titles-string "#W"

# =============================================================================
# AUTOMATIC WINDOW NAMING
# =============================================================================
# Disabled — window display uses #{b:pane_current_path} directly in the
# status formats above, so we don't need auto-rename to keep names current.
# Explicit rename (prefix + ,) still works if you want a custom name.
setw -g automatic-rename off

# =============================================================================
# INITIALIZE TPM (keep this line at the very bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'

