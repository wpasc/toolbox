# tmux configuration
# Philosophy: defaults where sensible, override only for clear ergonomic wins

# =============================================================================
# PLUGINS (TPM)
# =============================================================================
# Install plugins: prefix + I
# Update plugins:  prefix + U
# Remove plugins:  prefix + alt + u

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'sainnhe/tmux-fzf'

# =============================================================================
# CATPPUCCIN THEME
# =============================================================================
# Flavor: mocha (dark), latte (light), frappe, macchiato
set -g @catppuccin_flavor 'mocha'

# Window tabs: show window number and name
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Status bar modules (right side)
set -g @catppuccin_status_modules_right 'session date_time'
set -g @catppuccin_date_time_text '%m/%d %H:%M'

# =============================================================================
# PREFIX
# =============================================================================
# Ctrl-Space instead of default Ctrl-B.
# Why: Ctrl-B conflicts with readline backward-char and NeoVim's page-up.
# Ctrl-Space has no standard binding in shells, vim, or most terminal apps.
# Ctrl-A (screen-style) was considered but conflicts with readline go-to-start.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# =============================================================================
# SPLITS - OVERRIDING DEFAULTS
# =============================================================================
# | for vertical, - for horizontal (replaces default % and ").
# Why: the default keys have no visual mnemonic and " requires shift.
# | and - visually represent the split direction — obvious and easy to remember.
# v/s (vim-style) were considered but conflict with other tmux defaults.
# -c keeps the new pane in the same working directory (tmux default is $HOME).

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# =============================================================================
# PANE NAVIGATION
# =============================================================================
# hjkl pane navigation (in addition to default arrow keys which still work).
# Why: keeps hands on home row, consistent with NeoVim muscle memory.
# These require prefix first, so they don't conflict with NeoVim's own hjkl.
# vim-tmux-navigator (Ctrl+hjkl without prefix) was considered but rejected —
# Ctrl+hjkl conflicts with too many other tools (terminal, NeoVim plugins).

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# WINDOW MANAGEMENT
# =============================================================================
# Remapped to match browser/editor muscle memory (Cmd+N, Cmd+W).
# Why: tmux defaults are arbitrary (c=create, &=kill) with no mnemonic value.
# Browser/editor habits (n=new, w=close) are deeply ingrained and worth matching.
# Default w (window picker) is redundant with tmux-fzf (prefix + F).
# Default n (next window) is redundant with prefix + 1/2/3 direct jumps.

unbind c    # default: new window
unbind &    # default: kill window
unbind n    # default: next window
unbind w    # default: window picker (covered by tmux-fzf)
bind n new-window -c "#{pane_current_path}"
bind w confirm-before -p "kill window #W? (y/n)" kill-window

# =============================================================================
# QUALITY OF LIFE
# =============================================================================

# Reload config: prefix + r.
# Why: essential feedback loop when tweaking config — change, reload, verify.
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Start window numbering at 1 (0 is far from other numbers on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (avoid gaps)
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Enable mouse support (useful for beginners, can disable later if preferred)
set -g mouse on

# Allow OSC 52 clipboard passthrough (required for neovim clipboard over SSH)
set -g set-clipboard on

# Reduce escape delay (important for vim users)
set -sg escape-time 10

# =============================================================================
# APPEARANCE
# =============================================================================

# Status bar at top (feels like browser/editor tabs)
set -g status-position top

# Better terminal type for OSC 52 and true color support
set -g default-terminal "tmux-256color"

# =============================================================================
# INITIALIZE TPM (keep this line at the very bottom)
# =============================================================================
run '~/.tmux/plugins/tpm/tpm'
